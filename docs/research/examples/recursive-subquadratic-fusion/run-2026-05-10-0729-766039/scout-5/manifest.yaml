chain_length_x_context_length_papers:  # papers explicitly varying both axes
  - 2503.06692  # InftyThink (iterative summarize-continue; central plot is total CoT × per-iter context)
  - 2310.06770  # SWE-bench (oracle vs full-repo retrieval lets you separate context length from chain length)
  - 2306.15626  # LeanDojo (retrieval-K is an explicit context-length knob holding chain length distribution roughly fixed)
  - 2406.15877  # BigCodeBench (Hard split varies spec length and step count jointly)
  # NOTE: this list is small — most chain-length-scaling work holds context tiny; most long-context benchmarks hold chain depth small.

