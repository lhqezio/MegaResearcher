cheaper_falsification_path_summary: >-
  Take an open-weights NSA-style checkpoint (e.g., DeepSeek-V3.2 DSA
  arXiv:2512.02556) and apply TRM-style K=6 weight-tied recursion as an
  inference-time wrapper on the final transformer block (Huginn-style,
  arXiv:2502.05171 sec 5). Compare two runtime configs on BABILong
  qa3+qa4+qa5 at L=32K: (A) compressed branch active; (B) compressed-branch
  attention logits forced to -inf. Cost ~50 GPU-hours on a single 8xH100
  node. If accuracy(A) - accuracy(B) >= +3 the fallback hypothesis survives
  and merits full pre-training; if < +1 the hypothesis is dead before any
  pre-training run. Caveat: test-time-only recursion on a non-recursion-
  pre-trained model is a weaker probe (per Ouro), so a null result is
  suggestive but not conclusive while a positive result is strong evidence.

