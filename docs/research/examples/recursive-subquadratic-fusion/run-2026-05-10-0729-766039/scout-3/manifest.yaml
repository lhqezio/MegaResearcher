recursive_head_combinations_found:
  - arxiv: "2503.10799"
    name: "Fixed-Point RNNs"
    note: "K iterations of a diagonal linear RNN as fixed-point convergence to a dense linear RNN — closest existing work to architectural recursion on a linear-RNN backbone, but recursion is mathematical fixed-point, not TRM-style learned-operator iteration."
  - arxiv: "2407.04620"
    name: "TTT layers"
    note: "Hidden state IS a learnable model with a per-token inner optimisation step — recursion is along the sequence (one inner step per token), not depthwise."
  - arxiv: "2405.16712"
    name: "Zamba"
    note: "A single shared attention module is reused at multiple positions — share-and-reuse is structurally analogous to weight-tied recursion but only one application per call, not iterated K times."
  - arxiv: "2504.10449"
    name: "M1 (Mamba reasoning model)"
    note: "Achieves test-time-compute via long sequence-time CoT on a Mamba backbone — not architectural recursion in the forward pass, but the closest existing 'reasoning on SSM' system."
  - arxiv: "2505.22425"
    name: "Scaling Reasoning without Attention"
    note: "Pure-SSD reasoning model; recursion implicit in long output CoT, not architectural."
  - arxiv: "2304.11062"
    name: "Recurrent Memory Transformer (RMT)"
    note: "Segment-level recursion via memory tokens — different recursion granularity than TRM but informative for what state recursion can preserve in a long-context Transformer."

# Note: Of the 31 surveyed papers, no work was found that combines *TRM-style architectural recursion*
# (a learned operator iterated K times over a latent thought in the forward pass) with an SSM or
# linear-attention backbone. The list above documents adjacent constructions, not direct hits.

gaps_observed:
  - "No literal product of TRM-style architectural recursion x SSM backbone exists in the surveyed literature."
  - "All hard-reasoning results on subquadratic backbones (M1, Scaling-Reasoning-without-Attention, Thinking-Slow-Fast) achieve depth via sequence-time CoT, never via depth-time architectural recursion."
  - "State-tracking-limit papers all use synthetic FSAs / regular languages; empirical bite on math/proof/program-synthesis at scale is undercharacterised."
  - "Fixed-Point RNNs (2503.10799) is the closest construction; the formal relationship between fixed-point recursion and TRM-style learned-operator recursion is not established in the surveyed literature."
  - "The fusion thesis is silent on *which state object* recursion refines (SSM hidden state, memory tokens, input embeddings, separate latent); existing recursion papers all target the input/latent of an attention block."
  - "Hyena/Hyena-DNA (long-conv, no state) raises the question of whether stateless subquadratic backbones are even valid recursion targets — none of the surveyed work attempts this."
  - "RWKV-7 claims to lift the TC^0 ceiling at the backbone level; if true it competes with rather than complements architectural recursion. Surveyed literature does not directly compare."
  - "Hybrid-Architecture-Systematic-Analysis (2510.04800) is the most recent design map but does not include any recursion variants in its design space."

