falsifiability_check: FAIL
  detail: |
    F1/F2 do not isolate non-additive interaction (additive model satisfies them).
    F4 logit-probing is not operationalizable in proposed architecture.
    F3 cheap path tests a different hypothesis than the full pre-training claim
    and depends on a non-existent NSA reference checkpoint.
    Noise floor not specified; +8 threshold not calibrated.
arch_coherence_check: PARTIAL
  detail: |
    The hypothesis is structurally coherent at first order, but the M2 mechanism
    relies on the compressed branch carrying fact-specific information that M3
    presumes retrieval heads can exploit. The compressed branch is computed once
    per layer (not per iteration); the "second look channel" is via attention
    weights only. This is one step from incoherent if compressed-branch info is
    position-prior rather than content.
recursion_sense_check: FAIL
  detail: |
    K=1 vs K=6 are not FLOP-matched in the proposed design (recursion block runs
    6 times in K=6, once in K=1). Conflates "recursion specifically" with "more
    compute under sparse attention." This is the exact confound the spec's
    recursion-vs-CoT distinction is meant to prevent.
scale_plausibility_check: FAIL
  detail: |
    3,800 GPU-hours exceeds 2,000 GPU-hour fence.
    Cheap path F3 tests a different hypothesis (test-time recursion).
    No NSA reference checkpoint is publicly released; only zen-E/NSA-1B (104
    downloads, community) exists. F3 requires architecture-equivalence claim
    that does not hold (DSA != NSA).
    BABILong qa3-5 at L=64K may be at floor for 350M models, making +8 abs
    points unmeasurable.
non_additivity_check: FAIL
  detail: |
    F1/F2/F3 test joint outcomes consistent with the additive-marginals
    explanation: NSA K=1 > MoBA K=1, both backbones gain similarly from
    recursion (PLT data supports this for sliding-window). The hypothesis
    does not require non-additivity to satisfy its falsification criteria.
    Steelman: The K=1 NSA vs MoBA gap is the entire effect; recursion gains
    are backbone-agnostic. F2 satisfied, hypothesis "confirmed," but the
