hypothesis_id: H4
hypothesis_one_liner: >
  On an NSA backbone with MoR-style per-token expert-choice depth routing,
  conditioning the depth gate on a *full-attention dropped-mass* proxy
  (c_{t,k} = ĉ_φ predicting δ(t,k), supervised by occasional full-attention
  steps; NOT NSA's self-reported coverage) produces a non-additive multi-hop
  reasoning gain over independent training, because NSA's selection branch
  suffers a documented Gradient Update Deficiency (SSA arXiv:2511.20102
  Proposition 4.1) that makes its self-reported coverage structurally
  optimistic on multi-hop chains spanning ≥3 blocks.
