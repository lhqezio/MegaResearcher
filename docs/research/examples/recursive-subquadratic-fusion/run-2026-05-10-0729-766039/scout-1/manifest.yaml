gaps_observed:
  - "No paper combines architectural recursion with a token-dropping or sparse subquadratic operator at scale; PLT (sliding-window) is the only proximal example."
  - "Long-context evaluation (multi-doc QA, code-repo, long-horizon agent traces) is absent across the entire recursion corpus."
  - "Halting × subquadratic-routing interaction unstudied."
  - "Fixed-point fragility under attention sparsification unmeasured."
  - "No head-to-head comparison of BPTT vs 1-step DEQ-gradient vs deep supervision on a single backbone."
  - "Depth-recurrent latent CoT does not survive interpretability probes (arXiv:2507.02199) — open question whether recursion gains are 'reasoning' gains."
  - "Pretrained looped LMs at >1B (Huginn, Ouro) all use dense attention."
  - "Per-step receptive field of the recursive operator (does it see new tokens at later loops?) is rarely defined."
  - "Theory ceiling under subquadratic attention is open."
  - "Word collision: architectural vs agent-scaffolded vs structural-as-task 'recursion' must be disambiguated explicitly."
