cheaper_falsification_path_summary: >-
  Fine-tune (not just test-time wrap, addressing red-team S1) TRM-style
  K_arch ∈ {1, 4} weight-tied wrapper on the final two blocks of pre-trained
  TTT-Linear/LaCT/Mamba/dense checkpoints for 2B tokens with deep
  supervision. Three seeds per cell. Evaluate ΔA_TTT(K=4 − K=1) vs
  ΔA_dense(K=4 − K=1) on CRUXEval-X at d=3. Cost ≈120 GPU-hours on one
  8×H100 node. Kill-switch: if ΔA_TTT(K=4) ≥ 0.7 × ΔA_dense(K=4), the sub-
  additive saturation prediction is dead and §6 full-pre-training is aborted.

