cheaper_falsification_path_summary: >-
  Test-time-only TRM-style K_arch ∈ {1, 2, 4, 8} weight-tied wrapping on the
  final block of an open-weights TTT-Linear/LaCT checkpoint vs an open-weights
  Mamba checkpoint at matched scale (Huginn-style inference recursion per
  2502.05171 §5). Evaluate CRUXEval-O at d=3 with 5 init-projection-seed
  replicates. Cost ≈50 GPU-hours on one 8×H100 node. Kill-switch: if σ(TTT,
  K=4) − σ(TTT, K=1) < +1.0 with similar Mamba behavior, the destructive-
  interaction prediction is dead before any pre-training run. Caveat:
  test-time-only is a weaker probe than full pre-training (per Ouro
  2510.25741); a null in the cheaper path is suggestive not conclusive, but
  a positive is strong evidence to fund the full pre-training experiment.

