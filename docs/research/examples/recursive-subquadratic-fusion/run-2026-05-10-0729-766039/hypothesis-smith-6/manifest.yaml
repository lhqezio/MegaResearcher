claimed_gap_summary: >-
  Two distinct internalized-computation axes exist for sub-quadratic backbones —
  sequence-time inner-loop recursion (TTT 2407.04620, LaCT 2505.23884, TTT-as-
  linear-attention 2602.21204, One-Minute Video TTT 2504.05298, Longhorn
  2407.14207) and depth-time outer-loop recursion (TRM 2510.04871, HRM
  2506.21734, Huginn 2502.05171, Ouro 2510.25741, MoR 2507.10524, Latent
  Thoughts 2502.17416, Looped 2311.12424). Gap-finder-1 verified via
  hf_papers search no published work instantiates them jointly, ablates one
  against the other, or characterizes whether stacking is redundant,
  complementary, or destructive. CRUXEval (2401.03065) with per-instance
  program-recursion-depth and CoT-helpful/CoT-harmful subsplits is the right
  test surface; the structural-recursion baseline (2401.12947) gives the dense
  reference point.

mechanism_summary: >-
  TTT layers (2407.04620 §2.1) update fast weights W_t per token by SGD on a
  self-supervised loss; Figure 4 of the TTT paper shows W_t does not reach a
  fixed point within T=2048 — the hidden state is non-stationary along
  sequence-time. TRM (2510.04871 §4.1) iterates a weight-tied operator K times
  along depth, deep-supervised; each iteration re-runs the backbone forward
  pass on the same token positions but with a refined (y, z). When the
  backbone contains TTT layers, iteration k+1 reads a fast-weight trajectory
  W_t^(k) that depends on iteration k's now-stale (y, z). At intermediate
  K_arch ∈ {2, 4} two destructive regimes coexist: (M3a) stale-fast-weight
  reads — outer loop reads W_t before it has stabilized to iteration k+1's
  inputs; (M3b) over-fitted fast-weights — TTT inner loop has converged on
  iteration k's now-stale inputs and outer loop has no effective state to
  refine. Different seeds fall into different regimes, broadening the across-
  seed accuracy distribution. At K=1 no outer loop reads exist; at K=16 the
  outer loop dominates and TTT degenerates to near-static linear attention
  (per 2602.21204 equivalence). The variance peak in K_arch is the load-
  bearing non-additive signature.

predicted_outcome_summary: >-
  CRUXEval-O (2401.03065) at fixed program-recursion-depth d=3, no-CoT, 125M
  matched-param backbones, ≥5 seeds per cell. TTT-Linear backbone with TRM
  K_arch=4 wrap shows across-seed std ≥4× the K_arch=1 baseline std (≥6.0
  absolute points if K=1 std is ≈1.5). Mamba and dense-softmax controls under
  the same K_arch=4 wrap show monotone non-decreasing mean accuracy and flat
  across-seed std. The interaction term (TTT std lift at K=4) − (Mamba std
  lift at K=4) ≥ +3.0 absolute points. Variance peak is non-monotone in
  K_arch with peak at K∈{2,4}; recovers near K=16 as outer loop dominates.
  Effect grows with program-depth d; vanishes at d=1; vanishes with text-CoT
  enabled; vanishes at η=0 frozen-fast-weight TTT.

falsification_metric: >-
  Across-seed std σ of CRUXEval-O accuracy at d=3, computed across ≥5 seed
  replicates per (backbone, K_arch) cell. Five decisive criteria: (F1)
  variance lift σ(TTT, K=4); (F2) interaction term σ-diff vs Mamba; (F3)
  non-monotone K_arch curve; (F4) depth-axis specificity; (F5) CoT-confound
  control. Sixth bonus criterion (F6): η=0 TTT (≈ static linear attention)
  must show no variance lift.

falsification_threshold: >-
  F1: σ(TTT, K=4) < 2.0 × σ(TTT, K=1) ⇒ falsified (predicted ≥4×).
  F2: (σ(TTT, K=4) − σ(TTT, K=1)) − (σ(Mamba, K=4) − σ(Mamba, K=1)) <
  +1.5 abs points ⇒ falsified (predicted ≥+3.0).
  F3: σ(TTT, K=4) − ½(σ(TTT, K=1) + σ(TTT, K=16)) < +1.0 abs points ⇒
  falsified (predicted ≥+3.0; non-monotone peak required).
  F4: σ(TTT, K=4, d≥4) − σ(TTT, K=4, d=1) < +1.5 ⇒ falsified.
  F5: σ(TTT, K=4, no-CoT) − σ(TTT, K=4, CoT-helpful) < 0 ⇒ falsified.
  F6: σ(η=0 TTT, K=4) ≥ σ(TTT, K=4) ⇒ falsified (mechanism wrong:
  static-weight should NOT show the lift).

falsification_direction: >-
  All criteria are below-threshold falsifying. F2 and F6 also flip-sign
  falsifying (Mamba lift exceeding TTT lift, or static-weight TTT exceeding
  trained-weight TTT). The hypothesis lives or dies on the SECOND moment of
  the seed distribution, not the first; mean accuracy direction is not a
  primary falsifier (mean may even drop slightly at K=4 for TTT under M3a/M3b
  dominance, but this is allowed).

