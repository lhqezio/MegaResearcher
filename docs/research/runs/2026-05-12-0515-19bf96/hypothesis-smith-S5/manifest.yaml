claimed_baseline: |
  Further-tightened narrow gap claim (revision 2): no AI-Scientist-family
  end-to-end-experiment-and-paper system (the 14 systems in scout-1's matrix
  PLUS ARIS arXiv:2605.03042 added in revision 2) implements a
  block-on-unresolvable, deterministic-resolver, no-LLM-judge citation gate
  that fires autonomously at emit time. ARIS is the closest peer; its
  /citation-audit (existence + metadata + context-appropriateness axes) is
  advisory (human approval gate), LLM-judge based, and bundled — distinct
  from the proposed gate on three architectural dimensions.
  The broad gap is NOT claimed — Citegeist (2503.23229), ScholarCopilot
  (2504.00824), ARISE (2511.17689), ResearchPilot (2603.14629) achieve a
  stronger constructive guarantee via retrieve-then-write.
  Contribution magnitude is explicitly contracted: (a) the three-axis
  architectural delta against ARIS (blocking vs advisory; deterministic vs
  judge; existence-only vs bundled), and (b) the first published D
  measurement on PaperWrite-Bench (arXiv:2604.01128).
notes: |
  Revision 2 addresses three new critical defects from red-team-S5 round 2:
  - NEW-C1: ARIS (arXiv:2605.03042) engaged directly. Read §3.1, §3.2, §4.4, §6.
    Narrow gap claim re-tightened: block-on-unresolvable + deterministic-resolver
    + existence-only is the architectural delta. ARIS's citation-audit is
    advisory per §3.2 ("recommendations for human approval before submission")
    and LLM-judge based ("fresh cross-family reviewers with web access");
    Stage 1 of the audit cascade per §3.1 is explicit that audits do not
    halt execution.
  - NEW-C2: F4 fully deterministic. Off-corpus rate measurement uses
    `hf_papers paper_details` resolution + Citegeist retrieval-set
    auditing. No LLM-judge surface anywhere in F4.
  - NEW-C3: PaperWrite-Bench (arXiv:2604.01128, n=51) migrated to primary
    eval substrate. AI-Scientist-family n=30 retained as secondary for the
    family-specific gap claim.
  Important objections also addressed:
  - F1 Class A grounded in GSAP-NER (arXiv:2311.09860); F1 Class B regex
    expanded to cover BLEU/ROUGE/F1/perplexity/loss/latency/FLOPs; 5-manuscript
    extraction-completeness audit pre-registered.
  - §3 / §5 inconsistency RESOLVED: rewrite-to-prose is now explicitly counted
    as a drop under F1's matching rule; Component C's mechanism story
    narrows to citation-level redundancy alone; D ≤ 15% pre-registered as
    engineering judgment + redundancy-conditional-on-density ≥ 2.
  - BibAgent (arXiv:2601.16993) added to S8 sources.
  R6 (ARIS subsumption) and R7 (citation density < 2 conditional) added to §7.
