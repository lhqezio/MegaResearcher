hypothesis_title: Heterogeneous-model writer/reviewer split on an AI-Scientist-family pipeline lifts SPECS issue-recall over a stage-matched same-family 2-stage baseline (running ARIS Appendix E protocol on SPECS validated subset with cross-family judge protocol)
claimed_baseline: Stage-matched same-family writer/reviewer 2-stage pipeline (matched on prompt structure, stage count, total token budget, convergence threshold; NOT the AgentRxiv default)
predicted_magnitude: >=0.05 absolute lift in SPECS issue-recall on 22-perturbation human-consensus-valid subset (arXiv:2604.13940 A.9.4), with paired-difference bootstrap p<0.05 (uncorrected, single comparison), primary {claude, gpt} pair, averaged across writer/reviewer orientations, N=3 seeds; cross-family Gemini judge primary, OpenAI-default judge robustness check
non_judge_signal: NONE in Part A. CiteME (arXiv:2407.12861) was the rev-1 non-judge primary but red-team NEW-2 identified it as a single-agent retrieval benchmark with poor mechanism fit for writer/reviewer self-bias. Rev-2 accepts the SPECS LM-judge dependence as the trade for substrate-fit + budget compliance. Cross-family judge protocol (judge from family disjoint from both writer and reviewer in every cell) is the best non-same-family signal at the ≤$200 budget ceiling. OpenAI-default judge run as robustness check.
