honest_descope_note: |
  Revision 2 lowers the predicted lift from +8 to +6 percentage points. This is a genuine
  descope driven by empirical evidence on same-model representational collapse (Patel 2604.03809,
  AIMO 3 2603.27844). The smith's role is to produce the strongest defensible version of the
  hypothesis, not to preserve the original magnitude. +6 over 1080 pre-registered binary decisions
  with AbGen-grade expert annotations and canonical-leaderboard ground truth remains a publishable
  result if it materializes. If the synthesist judges +6 too low for the contribution to land, the
  audit trail surfaces this for the user.
