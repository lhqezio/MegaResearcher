# Revision-2 changes summary
revision_summary:
  - "CR1 addressed: same-model effective-N discount re-derived from Patel arXiv:2604.03809 (effective rank 2.17/3.0 = 27.7% at N=3 on GSM8K, worsens to 2.09/3.0 = 30.3% on MATH-500). Predicted F1 floor descoped from +8 to +6 percentage points using a 30% discount on Choi's doubled-anchor (4.86 * 2.0 * 0.70 = 6.79 -> floor +6). AIMO 3 arXiv:2603.27844 cited as supporting evidence."
  - "CR2 addressed: baseline-list candidate-universe construction switched to PATH B (canonical-leaderboard tasks). Paper sample restricted to 12 papers from 5 canonical-leaderboard benchmarks (GLUE / SuperGLUE / ImageNet-1k / COCO / WMT-EnDe). Per-task K_baseline=30 universe = published leaderboard top-30 entries at frozen Jan 1 2026. Fully deterministic, zero LM-derivation."
  - "CR3 addressed: ablation-axis substrate switched to AbGen arXiv:2507.13300 (1500 expert-annotated examples from 807 NLP papers, Cohen's Kappa 0.71-0.78 ACL-area-chair agreement). Uses 100 references sampled at frozen seed=42 from AbGen testmini-500. Per-axis labels extracted deterministically via pre-registered keyword lexicons."
  - "I1-rev addressed: 12-axis taxonomy collapsed to 6 non-overlapping axes (architecture-component, training-data, training-objective, hyperparameter, evaluation-protocol, inference-procedure). Lexicons pre-registered. Multi-axis bucket flag for ambiguous references."
  - "I2-rev addressed: F3 modal-bias check recast as a CONTRAST (|unanimous-rate on positive items minus unanimous-rate on negative items| < 30 percentage points) rather than absolute >70%. Distinguishes 'voting converges on correct items' from 'voting unanimously wrong due to shared bias.'"
  - "I3-rev addressed: 'ICLR rubric enumerates' framing replaced with 'pre-registered taxonomies aligned with ICLR-rubric concerns' throughout section 1."
  - "I4-rev addressed: dual threshold pre-registered. Statistical floor (p < 0.001 McNemar) AND practical floor (Delta >= +6). Hypothesis passes only if both met. R6 added to risks."

