  PASS_workshop_grade: F1 Δ ≥ 0.05 AND p < 0.13 AND OpenAI-judge same direction AND F4 holds
  PARTIAL: 0.03 ≤ Δ < 0.05 AND consistent direction across orientations AND OpenAI-judge same direction
