falsification_experiments_count: 4
falsification_criteria:
  - id: F1
    test: paired-difference bootstrap on Correctness+Evaluations recall
    threshold: Δ ≥ 0.05 AND p < 0.13 (workshop-grade) / p < 0.05 (main-track reference) AND OpenAI-judge same-direction
  - id: F2'
    test: per-orientation lift recomputation
    threshold: both orientation-level Δ values < 0 → falsifies
  - id: F3
    test: substance-axis vs presentation-axis Δ comparison (within-paper)
    threshold: Δ_substance − Δ_presentation < 0.03 → falsifies
  - id: F4
    test: per-orientation Δ vs across-orientation mean
    threshold: per-orientation Δ outside ±1 paired-difference SE band (expected ~0.044)

